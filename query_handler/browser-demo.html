<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS5296 Query API Browser Demo</title>
  <style>
    :root {
      --bg-1: #f4efe6;
      --bg-2: #efe3d2;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #1f1b16;
      --muted: #6a5f54;
      --accent: #c4512d;
      --accent-2: #1f6b66;
      --border: rgba(31, 27, 22, 0.12);
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(196, 81, 45, 0.16), transparent 40%),
        radial-gradient(circle at 85% 10%, rgba(31, 107, 102, 0.16), transparent 38%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      padding: 24px;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(3px);
    }

    h1 {
      margin: 0 0 8px;
      letter-spacing: 0.4px;
      font-size: clamp(1.3rem, 2.6vw, 2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .card h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    input,
    button,
    textarea {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.9);
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .inline {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 120px;
    }

    button {
      cursor: pointer;
      border: none;
      color: #fff;
      font-weight: 700;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    #runText {
      background: linear-gradient(135deg, var(--accent), #e27949);
    }

    #runImage {
      background: linear-gradient(135deg, var(--accent-2), #2f8982);
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .status {
      min-height: 24px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .results {
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.76);
      animation: rise 240ms ease both;
    }

    .result-item h3 {
      margin: 0 0 6px;
      font-size: 0.95rem;
      color: var(--text);
    }

    .meta {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 6px;
    }

    pre {
      margin: 0;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 8px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.84rem;
    }

    @keyframes rise {
      from {
        transform: translateY(4px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .inline {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>CS5296 Query API Demo</h1>
      <p>Direct browser test page for API Gateway endpoints. Base URL: <strong>https://abn57op5z4.execute-api.us-east-1.amazonaws.com/prod</strong></p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Text Search</h2>
        <label>
          Query text
          <textarea id="textInput">red compact suv alloy wheels</textarea>
        </label>
        <label>
          Result size
          <input id="textSize" type="number" min="1" value="5" />
        </label>
        <button id="runText" type="button">Run Text Search</button>
      </article>

      <article class="card">
        <h2>Image Search</h2>
        <label>
          Image file
          <input id="imageFile" type="file" accept="image/*" />
        </label>
        <label>
          Result size
          <input id="imageSize" type="number" min="1" value="5" />
        </label>
        <button id="runImage" type="button">Run Image Search</button>
      </article>
    </section>

    <section class="results">
      <div id="status" class="status">Ready.</div>
      <div id="list"></div>
      <h3>Raw JSON</h3>
      <pre id="raw">(response will appear here)</pre>
    </section>
  </main>

  <script>
    const API_BASE = "https://abn57op5z4.execute-api.us-east-1.amazonaws.com/prod";

    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("list");
    const rawEl = document.getElementById("raw");

    function setStatus(msg, ok = true) {
      statusEl.textContent = msg;
      statusEl.style.color = ok ? "#1f6b66" : "#a42525";
    }

    function renderResults(data) {
      const arr = Array.isArray(data) ? data : [];
      listEl.innerHTML = "";

      if (arr.length === 0) {
        listEl.innerHTML = '<div class="result-item"><h3>No results</h3><div class="meta">Response array is empty.</div></div>';
        return;
      }

      arr.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = "result-item";

        const title = document.createElement("h3");
        title.textContent = `#${idx + 1} ${item._id || "(no id)"}`;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `index: ${item._index || "-"} | score: ${item._score ?? "-"}`;

        const desc = document.createElement("pre");
        desc.textContent = JSON.stringify(item._source || item, null, 2);

        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(desc);
        listEl.appendChild(card);
      });
    }

    async function toBase64NoPrefix(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const full = String(reader.result || "");
          const comma = full.indexOf(",");
          resolve(comma >= 0 ? full.slice(comma + 1) : full);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function requestAndRender(url, options = {}) {
      try {
        setStatus("Request in progress...");
        const res = await fetch(url, options);
        const data = await res.json();
        rawEl.textContent = JSON.stringify({ status: res.status, data }, null, 2);

        if (!res.ok) {
          setStatus(`Failed with status ${res.status}`, false);
          renderResults([]);
          return;
        }

        setStatus(`Success: ${res.status}`);
        renderResults(data);
      } catch (err) {
        setStatus(`Network error: ${String(err)}`, false);
        rawEl.textContent = JSON.stringify({ error: String(err) }, null, 2);
        renderResults([]);
      }
    }

    document.getElementById("runText").addEventListener("click", () => {
      const inputText = document.getElementById("textInput").value.trim();
      const size = document.getElementById("textSize").value || "5";

      if (!inputText) {
        setStatus("Please provide query text.", false);
        return;
      }

      const url = `${API_BASE}/text-search?inputText=${encodeURIComponent(inputText)}&size=${encodeURIComponent(size)}`;
      requestAndRender(url);
    });

    document.getElementById("runImage").addEventListener("click", async () => {
      const file = document.getElementById("imageFile").files[0];
      const size = Number(document.getElementById("imageSize").value || "5");

      if (!file) {
        setStatus("Please choose an image file.", false);
        return;
      }

      try {
        const image = await toBase64NoPrefix(file);
        requestAndRender(`${API_BASE}/search-image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image, size })
        });
      } catch (err) {
        setStatus(`Image read failed: ${String(err)}`, false);
      }
    });
  </script>
</body>
</html>
